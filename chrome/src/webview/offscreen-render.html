<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Render Frame</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      background: transparent;
      width: 1400px;
      min-height: 600px;
    }
  </style>
</head>
<body>
  <div id="render-container"></div>
  <canvas id="png-canvas"></canvas>
  
  <!-- Mermaid loaded separately to keep bundle size manageable -->
  <script src="../libs/mermaid.min.js"></script>
  <!-- drawio2svg loaded separately (shared by PlantUML + DrawIO renderers) -->
  <script src="../core/drawio2svg.js"></script>
  <!-- draw-uml loaded separately (PlantUML DSL parser) -->
  <script src="../core/draw-uml.js"></script>
  <script src="../core/offscreen-render-worker.js"></script>
</body>
</html>
